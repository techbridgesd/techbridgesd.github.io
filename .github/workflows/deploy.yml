name: Deploy to GitHub Pages

# Runs every time you push a change to the main branch (including edits made
# directly on github.com), and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the workflow needs to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only let one deploy run at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the website
        run: npm run build

      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
